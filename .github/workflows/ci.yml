name: CI Suite Automatizada - MVP

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar código fuente
      uses: actions/checkout@v4

    - name: Configurar Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip' # Optimiza el tiempo de descarga instalando dependencias en caché

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Ejecutar Suite Híbrida (Pytest + Behave)
      env:
        # El driver detecta automáticamente el modo headless si lo configurás en las opciones
        MOZ_HEADLESS: 1
      run: |
        # Corremos tanto los tests nativos de pytest como los wrappers de behave
        python -m pytest -v

    - name: Subir Reportes HTML como Artefactos
      if: always() # Se ejecuta aunque hayan fallado los tests para poder auditar el error
      uses: actions/upload-artifact@v4
      with:
        name: reporte-html-ejecucion
        path: reports/
        retention-days: 5