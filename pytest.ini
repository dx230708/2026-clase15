[pytest]
# Configuración de ejecución por defecto (opcional)
addopts = -v --strict-markers

# Registro oficial de marcadores para segmentar la suite
markers =
    smoke: Pruebas críticas de humo para el flujo del carrito (UI)
    web: Pruebas de interfaz de usuario con Selenium
    api: Pruebas de validación de endpoints y servicios HTTP